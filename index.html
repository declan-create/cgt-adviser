<!DOCTYPE html>
<html lang="en-AU">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Australian Commonwealth Budget 2026 — Modelling the Changes</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
:root{
  --bg:#fff;--bg2:#f8f8f6;--bg3:#f0f0ee;
  --txt:#1a1a1a;--txt2:#666;
  --bdr:rgba(0,0,0,0.12);--bdr2:rgba(0,0,0,0.22);
  --info-bg:#e6f1fb;--info-txt:#185fa5;
  --warn-bg:#faeeda;--warn-txt:#854f0b;
  --r:8px;--rl:12px;
  --red:#c42a2a;--red2:#a32d2d;--redl:#fcebeb;
  --green:#3b6d11;--greenl:#eaf3de;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1e1e1e;--bg2:#2a2a2a;--bg3:#333;
  --txt:#f0f0f0;--txt2:#aaa;
  --bdr:rgba(255,255,255,0.1);--bdr2:rgba(255,255,255,0.2);
}}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;color:var(--txt);font-size:15px;line-height:1.6;background:#ece9e3;min-height:100vh;padding:1.5rem 1rem}
.outer{max-width:800px;margin:0 auto}


#keyLink{font-size:12px;color:var(--txt2);margin-top:12px}
#keyLink a{color:var(--info-txt)}

/* App */

.hdr{background:var(--red);border-radius:var(--rl);padding:1.2rem 1.5rem;margin-bottom:1rem;display:flex;align-items:center;gap:12px}
.hico{width:38px;height:38px;border-radius:50%;background:rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hdr h1{font-size:17px;font-weight:500;color:#fff;margin-bottom:2px}
.hdr p{font-size:12px;color:rgba(255,255,255,.72)}
.rbtn{border:0.5px solid rgba(255,255,255,0.4);background:none;color:rgba(255,255,255,0.85);border-radius:999px;padding:5px 14px;font-size:12px;cursor:pointer;margin-left:auto;white-space:nowrap}
.rbtn:hover{background:rgba(255,255,255,0.15)}

/* Progress */
.pr{display:flex;gap:5px;align-items:center;margin-bottom:1rem}
.ps{height:4px;flex:1;border-radius:2px;background:var(--bdr);transition:background .3s}
.ps.done{background:var(--red)}.ps.active{background:#e24b4a}
.plbl{font-size:11px;color:var(--txt2);min-width:110px;text-align:right}

/* Chat */
.cw{background:var(--bg2);border-radius:var(--rl);overflow:hidden;border:0.5px solid var(--bdr)}
.cm{padding:1.25rem;display:flex;flex-direction:column;gap:10px;min-height:220px;max-height:420px;overflow-y:auto}
.msg{display:flex;gap:10px;align-items:flex-start}
.av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;flex-shrink:0;margin-top:2px}
.av-ai{background:var(--red);color:#fff}.av-u{background:var(--info-bg);color:var(--info-txt)}
.bub{padding:10px 14px;border-radius:12px;font-size:14px;line-height:1.65;max-width:calc(100% - 42px)}
.bub-ai{background:var(--bg);border:0.5px solid var(--bdr);border-top-left-radius:3px;color:var(--txt)}
.bub-u{background:var(--red);color:#fff;border-top-right-radius:3px;margin-left:auto}
.bub-t{background:var(--bg);border:0.5px solid var(--bdr);color:var(--txt2);font-style:italic}
.bub-err{background:var(--redl);border:0.5px solid #f7c1c1;color:var(--red2);border-top-left-radius:3px}
.qr{display:flex;flex-wrap:wrap;gap:6px;padding:0 1.25rem .75rem}
.qp{padding:6px 13px;border-radius:999px;border:0.5px solid var(--red);background:var(--bg);font-size:12px;cursor:pointer;color:var(--red2)}
.qp:hover{background:var(--redl)}
.cin{border-top:0.5px solid var(--bdr);padding:.75rem 1rem;display:flex;gap:8px;background:var(--bg)}
.cin input{flex:1;border:0.5px solid var(--bdr2);border-radius:var(--r);padding:9px 12px;font-size:14px;background:var(--bg);color:var(--txt)}
.cin input:focus{outline:none;border-color:var(--red)}
.sbtn{background:var(--red);color:#fff;border:none;border-radius:var(--r);padding:9px 16px;font-size:13px;font-weight:500;cursor:pointer}
.sbtn:disabled{opacity:.4;cursor:not-allowed}

/* Collected */
.slbl{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.05em;color:var(--txt2);margin-bottom:.5rem}
.cg{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:7px;margin-top:.6rem}
.ci{background:var(--bg);border:0.5px solid var(--bdr);border-radius:var(--r);padding:9px 12px}
.ci .cl{font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--txt2);font-weight:500}
.ci .cv{font-size:14px;font-weight:500;margin-top:3px;color:var(--txt)}

/* Results */
.rw{margin-top:1rem}
.rh{background:var(--red);border-radius:var(--rl);padding:1.25rem 1.5rem;color:#fff;margin-bottom:1rem}
.rh .rt{font-size:11px;opacity:.75;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
.rh h2{font-size:19px;font-weight:500;margin-bottom:8px}
.rh p{font-size:13px;opacity:.85;line-height:1.6}
.vpill{display:inline-flex;align-items:center;padding:4px 12px;border-radius:999px;font-size:12px;font-weight:500;margin-bottom:10px}
.vg{background:var(--greenl);color:var(--green)}.va{background:var(--warn-bg);color:var(--warn-txt)}
.vr{background:var(--redl);color:var(--red2)}.vi{background:var(--info-bg);color:var(--info-txt)}.vp{background:#eeedfe;color:#3c3489}
.mg{display:grid;grid-template-columns:repeat(auto-fit,minmax(135px,1fr));gap:8px;margin-bottom:1rem}
.mc{background:var(--bg2);border-radius:var(--r);padding:11px 13px}
.mc .ml{font-size:10px;text-transform:uppercase;letter-spacing:.04em;color:var(--txt2);font-weight:500}
.mc .mv{font-size:19px;font-weight:500;margin-top:3px}
.pos{color:var(--green)}.neg{color:var(--red2)}.neu{color:var(--txt)}
.es{background:var(--bg);border:0.5px solid var(--bdr);border-radius:var(--rl);margin-bottom:.75rem;overflow:hidden}
.eh{padding:.9rem 1.25rem;display:flex;align-items:center;justify-content:space-between;cursor:pointer;gap:12px;user-select:none}
.eh:hover{background:var(--bg2)}
.et{font-size:14px;font-weight:500;color:var(--txt)}.es2{font-size:12px;color:var(--txt2);margin-top:2px}
.eb{padding:0 1.25rem 1rem;display:none;border-top:0.5px solid var(--bdr)}
.eb.open{display:block;padding-top:.75rem}
.eb table{width:100%;border-collapse:collapse;margin-bottom:.75rem}
.eb td{padding:7px 8px;border-bottom:0.5px solid var(--bdr);font-size:13px;vertical-align:top;color:var(--txt)}
.eb td:first-child{color:var(--txt2);width:60%}
.eb td:last-child{font-weight:500;text-align:right}
.eb tr.total td{border-top:1px solid var(--bdr2);border-bottom:none;font-weight:500}
.iaw{margin-top:.75rem;display:flex;gap:7px}
.iaw input{flex:1;border:0.5px solid var(--bdr2);border-radius:var(--r);padding:7px 10px;font-size:13px;background:var(--bg);color:var(--txt)}
.iaw input:focus{outline:none;border-color:var(--red)}
.iaw button{background:var(--red);color:#fff;border:none;border-radius:var(--r);padding:7px 13px;font-size:12px;cursor:pointer}
.ia-ans{margin-top:8px;font-size:13px;color:var(--txt2);background:var(--bg2);border-radius:var(--r);padding:10px 12px;line-height:1.7;display:none}
.disc{font-size:11px;color:var(--txt2);border:0.5px solid var(--bdr);border-radius:var(--r);padding:10px 12px;margin-top:1rem;line-height:1.6}
.hidden{display:none}
.sc-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1rem}
@media(max-width:500px){.sc-grid{grid-template-columns:1fr}}
.sc{background:var(--bg);border:0.5px solid var(--bdr);border-radius:10px;padding:1rem}
.sc.best{border:1.5px solid var(--green)}
.sc .stag{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:.05em;color:var(--txt2);margin-bottom:5px}
.sc h3{font-size:14px;font-weight:500;margin-bottom:8px;color:var(--txt)}
.sc .sr{display:flex;justify-content:space-between;font-size:13px;padding:4px 0;border-bottom:0.5px solid var(--bdr);color:var(--txt)}
.sc .sr:last-of-type{border-bottom:none}
.sc .snote{margin-top:10px;font-size:12px;padding:6px 10px;border-radius:6px;line-height:1.5}
.tl{margin:1rem 0;display:flex;flex-direction:column}
.tli{display:flex;gap:12px;align-items:flex-start}
.tld{width:12px;height:12px;border-radius:50%;background:var(--red);flex-shrink:0;margin-top:5px}
.tll{width:2px;background:var(--bdr);flex-shrink:0;margin-left:5px;height:24px}
.tlc{padding-bottom:16px;font-size:13px}
.tldate{font-weight:500;color:var(--txt)}.tldesc{color:var(--txt2);margin-top:2px}
.nsg{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:8px;margin-bottom:1rem}
.ns{background:var(--bg);border:0.5px solid var(--bdr);border-radius:10px;padding:.85rem 1rem}
.ns .nt{font-size:13px;font-weight:500;margin-bottom:4px;color:var(--txt)}
.ns .nd{font-size:12px;color:var(--txt2);line-height:1.5}

/* ── Persistent AI Adviser ── */
#advPanel{margin-top:1.5rem;background:var(--bg);border:0.5px solid var(--bdr);border-radius:var(--rl);overflow:hidden;display:none}
#advPanel.visible{display:block}
.adv-header{background:var(--red);padding:1rem 1.25rem;display:flex;align-items:center;gap:10px}
.adv-header h3{color:#fff;font-size:15px;font-weight:500;margin:0}
.adv-header p{color:rgba(255,255,255,.75);font-size:12px;margin:0}
.adv-history{padding:1rem 1.25rem;display:flex;flex-direction:column;gap:10px;max-height:500px;overflow-y:auto;background:var(--bg2)}
.adv-msg{display:flex;gap:10px;align-items:flex-start}
.adv-bub{padding:10px 14px;border-radius:12px;font-size:14px;line-height:1.7;max-width:calc(100% - 42px);white-space:pre-wrap;word-wrap:break-word}
.adv-bub-ai{background:var(--bg);border:0.5px solid var(--bdr);border-top-left-radius:3px;color:var(--txt)}
.adv-bub-u{background:var(--red);color:#fff;border-top-right-radius:3px;margin-left:auto}
.adv-bub-t{background:var(--bg);border:0.5px solid var(--bdr);color:var(--txt2);font-style:italic}
.adv-chips{display:flex;flex-wrap:wrap;gap:6px;padding:.75rem 1.25rem;border-top:0.5px solid var(--bdr);background:var(--bg2)}
.adv-chip{padding:6px 13px;border-radius:999px;border:0.5px solid var(--red);background:var(--bg);font-size:12px;cursor:pointer;color:var(--red2)}
.adv-chip:hover{background:var(--redl)}
.adv-input-row{border-top:0.5px solid var(--bdr);padding:.75rem 1rem;display:flex;gap:8px;background:var(--bg)}
.adv-input-row input{flex:1;border:0.5px solid var(--bdr2);border-radius:var(--r);padding:9px 12px;font-size:14px;background:var(--bg);color:var(--txt)}
.adv-input-row input:focus{outline:none;border-color:var(--red)}
.adv-input-row button{background:var(--red);color:#fff;border:none;border-radius:var(--r);padding:9px 16px;font-size:13px;font-weight:500;cursor:pointer}
.adv-input-row button:disabled{opacity:.4;cursor:not-allowed}
.mc{position:relative;padding-right:28px}.mc-ask{position:absolute;top:6px;right:6px;width:18px;height:18px;border-radius:50%;background:rgba(196,42,42,0.12);border:1.5px solid var(--red);color:var(--red);font-size:10px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;padding:0;transition:all .15s}.mc-ask:hover{background:var(--red);color:#fff}
.eb-rows{display:flex;flex-direction:column;gap:0}.eb-row{display:flex;justify-content:space-between;align-items:flex-start;padding:10px 0;border-bottom:0.5px solid var(--bdr);gap:12px}.eb-row:last-child{border-bottom:none}.eb-total{font-weight:600;border-top:1px solid var(--bdr2);padding-top:12px}.eb-label{color:var(--txt2);font-size:13px;line-height:1.5;flex:1}.eb-val{font-size:13px;font-weight:500;text-align:right;line-height:1.5;display:flex;align-items:center;gap:4px;flex-shrink:0}.eb-div{height:1px;background:var(--bdr2);margin:8px 0}.sr-ask{width:16px;height:16px;border-radius:50%;background:rgba(196,42,42,0.12);border:1.5px solid var(--red);color:var(--red);font-size:9px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;padding:0;margin-left:5px;flex-shrink:0;transition:all .15s}.sr-ask:hover{background:var(--red);color:#fff}
</style>
</head>
<body>
<div class="outer">

<!-- NO KEY GATE - key handled server side -->
<!-- MAIN APP -->
<div id="app">
  <div class="hdr" style="background:linear-gradient(135deg,#8b1a1a 0%,#c42a2a 50%,#a32020 100%);padding:1.5rem 1.5rem;border-radius:var(--rl);margin-bottom:1rem;position:relative;overflow:hidden">
    <div style="position:absolute;top:-30px;right:-30px;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,0.04)"></div>
    <div style="position:absolute;bottom:-50px;right:60px;width:120px;height:120px;border-radius:50%;background:rgba(255,255,255,0.03)"></div>
    <div style="position:relative;z-index:1;display:flex;align-items:flex-start;gap:14px">
      <div style="width:44px;height:44px;border-radius:10px;background:rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px">
        <i class="ti ti-building-estate" style="font-size:22px;color:#fff"></i>
      </div>
      <div style="flex:1">
        <div style="font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,0.6);margin-bottom:4px">Property Tax Planning Tool</div>
        <h1 style="font-size:20px;font-weight:600;color:#fff;margin-bottom:5px;line-height:1.2">Australian Commonwealth Budget 2026</h1>
        <div style="font-size:15px;font-weight:400;color:rgba(255,255,255,0.9);margin-bottom:8px">Modelling the changes</div>
        <div style="display:flex;flex-wrap:wrap;gap:6px">
          <span style="background:rgba(255,255,255,0.12);border:0.5px solid rgba(255,255,255,0.2);color:rgba(255,255,255,0.85);border-radius:999px;padding:3px 10px;font-size:11px">11 scenarios</span>
          <span style="background:rgba(255,255,255,0.12);border:0.5px solid rgba(255,255,255,0.2);color:rgba(255,255,255,0.85);border-radius:999px;padding:3px 10px;font-size:11px">AI-powered analysis</span>
          <span style="background:rgba(255,255,255,0.12);border:0.5px solid rgba(255,255,255,0.2);color:rgba(255,255,255,0.85);border-radius:999px;padding:3px 10px;font-size:11px">Conversational intake</span>
        </div>
      </div>
      <button class="rbtn" onclick="restart()" style="flex-shrink:0;margin-top:2px">Start over</button>
    </div>
  </div>
  <div class="pr">
    <div class="ps" id="ps1"></div><div class="ps" id="ps2"></div>
    <div class="ps" id="ps3"></div><div class="ps" id="ps4"></div><div class="ps" id="ps5"></div>
    <span class="plbl" id="plbl">Getting started</span>
  </div>
  <div class="cw">
    <div class="cm" id="cm"><div class="msg"><div class="av av-ai">AI</div><div class="bub bub-ai" id="staticWelcome">Welcome to the Australian Budget CGT adviser. Loading...</div></div></div>
    <div class="qr" id="qr"></div>
    <div class="cin">
      <input type="text" id="mi" placeholder="Describe your situation or answer the question..." onkeydown="if(event.key==='Enter'&&!event.shiftKey)send()">
      <button class="sbtn" id="sb" onclick="send()">Send</button>
    </div>
  </div>
  <div class="hidden" id="cw2">
    <div class="slbl" style="margin-top:1rem">Information collected</div>
    <div class="cg" id="cg"></div>
  </div>
  <div class="rw hidden" id="rw"></div>
</div>

</div><!-- /outer -->
<script>
// ─── STATE ───────────────────────────────────────────────────────────────────

let hist = [], stage = 'intake', tel = null;
const D = {scenarioType:null,assetUse:null,heldBefore:null,heldYears:null,costBase:null,currentValue:null,transitionValue:null,futureValue:null,ownerPct:null,mtr:null,expectedGrowth:null,yearsHorizon:null,loanBalance:null,interestRate:null,annualIncome:null,annualExpenses:null,newPropPrice:null,newPropLoan:null,newPropRent:null,newPropExpenses:null,pporConvertRent:null,pporConvertExp:null,inflationRate:null,yearsToReform:null,yearsAfterReform:null,existingPortfolioIncome:null};
const DL = {scenarioType:'Scenario',existingPortfolioIncome:'Existing portfolio net income',assetUse:'Asset use',heldBefore:'Held before Budget?',heldYears:'Years held',costBase:'Cost base',currentValue:'Current value',transitionValue:'1 Jul 2027 value',futureValue:'Future sale value',ownerPct:'Ownership %',mtr:'Tax rate',expectedGrowth:'Growth %',yearsHorizon:'Horizon (yr)',loanBalance:'Loan balance',interestRate:'Interest rate',annualIncome:'Annual income',annualExpenses:'Annual expenses',newPropPrice:'New prop price',newPropLoan:'New prop loan',newPropRent:'New prop rent',newPropExpenses:'New prop expenses',pporConvertRent:'PPOR rent',pporConvertExp:'PPOR expenses',inflationRate:'Inflation',yearsToReform:'Yrs to reform',yearsAfterReform:'Yrs after reform'};

// ─── KEY GATE ─────────────────────────────────────────────────────────────────


// All DOM-ready setup in one place
function domReady(fn) {
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', fn);
  } else {
    fn();
  }
}

function copyCmd() {
  var cmd = 'python -m http.server 8000';
  if (navigator.clipboard) { navigator.clipboard.writeText(cmd); }
  var btn = document.querySelector('#fileWarning button');
  if (btn) { btn.textContent = 'Copied!'; setTimeout(function(){ btn.textContent = 'Copy'; }, 2000); }
}

domReady(function() {
  // Show file:// warning if needed
  // Try to restore key from localStorage (works in real browser, may be blocked in sandbox)
  init();
});

// ─── HELPERS ─────────────────────────────────────────────────────────────────
const fmt = x => { x = Math.round(Number(x)||0); return (x<0?'-':'')+'$'+Math.abs(x).toLocaleString('en-AU'); };
const pct = x => (Math.round((x||0)*10)/10)+'%';
const fv = (p,r,y) => p * Math.pow(1+(r||0)/100, y);
const n = v => parseFloat(v)||0;
const $ = id => document.getElementById(id);

function addMsg(html, role) {
  const area = $('cm'), w = document.createElement('div');
  w.className = 'msg';
  if (role === 'user') {
    w.innerHTML = `<div class="bub bub-u" style="margin-left:auto">${html}</div><div class="av av-u">You</div>`;
  } else {
    const cls = role === 't' ? 'bub-t' : role === 'err' ? 'bub-err' : 'bub-ai';
    w.innerHTML = `<div class="av av-ai">AI</div><div class="bub ${cls}">${html}</div>`;
  }
  area.appendChild(w);
  area.scrollTop = area.scrollHeight;
  return w.querySelector('.bub');
}

function showT() {
  const el = addMsg('Thinking…', 't');
  let i = 0;
  el._t = setInterval(() => { el.textContent = 'Thinking' + ['…','.. ','.  '][i++%3]; }, 400);
  tel = el;
  return el;
}
function hideT() {
  if (tel) { clearInterval(tel._t); tel.closest('.msg').remove(); tel = null; }
}

function setQP(picks) {
  $('qr').innerHTML = picks.map(p =>
    `<button class="qp" onclick="useQP(this,'${p.replace(/'/g,"\\'")}')">${p}</button>`
  ).join('');
}
function useQP(b, v) { $('qr').innerHTML = ''; $('mi').value = v; send(); }

function updProg(s) {
  const L = ['Getting started','Understanding situation','Gathering details','Building analysis','Complete'];
  for (let i = 1; i <= 5; i++) {
    $('ps'+i).className = 'ps' + (i < s ? ' done' : i === s ? ' active' : '');
  }
  $('plbl').textContent = L[Math.min(s-1, 4)];
}

function updColl() {
  const w = $('cw2'), g = $('cg');
  const f = Object.entries(D).filter(([,v]) => v !== null && v !== '');
  if (!f.length) { w.classList.add('hidden'); return; }
  w.classList.remove('hidden');
  g.innerHTML = f.map(([k,v]) =>
    `<div class="ci"><div class="cl">${DL[k]||k}</div><div class="cv">${typeof v==='number'&&Math.abs(v)>999?fmt(v):v}</div></div>`
  ).join('');
}

function progFromData() {
  if (stage === 'results') { updProg(5); return; }
  const r = Object.values(D).filter(v => v !== null).length / Object.keys(D).length;
  updProg(r === 0 ? 1 : r < .15 ? 2 : r < .35 ? 3 : 4);
}

function extractTags(text) {
  (text.match(/__SET_(\w+):([^_\n]+?)__/g) || []).forEach(tag => {
    const m = tag.match(/__SET_(\w+):([^_\n]+?)__/);
    if (m && D.hasOwnProperty(m[1])) {
      const raw = m[2].trim(), nn = parseFloat(raw.replace(/,/g,''));
      D[m[1]] = isNaN(nn) ? raw : nn;
    }
  });
  if (text.includes('__SHOW_ASSUMPTIONS__')) {
    // Safety override: if conversation mentions PPOR but scenario is wrong, fix it
    const fullConv = hist.map(m => m.content).join(' ').toLowerCase();
    const ppor_keywords = ['live in', 'my home', 'owner occupied', 'principal place', 'ppor', 'where i live', 'i live there', 'live there'];
    const is_ppor = ppor_keywords.some(k => fullConv.includes(k));
    if (is_ppor && (!D.scenarioType || D.scenarioType === 'hold_or_sell')) {
      D.scenarioType = 'ppor_convert';
    }
    stage = 'assumptions';
    showAssumptionsPanel();
  }
  if (text.includes('__COMPLETE__')) {
    stage = 'results'; buildResults();
  }
}

async function callAPI(systemPrompt, messages, maxTokens = 600) {
  const resp = await fetch(
      (window.location.hostname === 'localhost') ? '/api/claude' :
      (window.location.hostname === '' || window.location.hostname.includes('claude.ai') || window.location.hostname.includes('anthropic.com')) ? 'https://api.anthropic.com/v1/messages' :
      '/.netlify/functions/claude', {
    method: 'POST',
    headers: Object.assign(
      {'Content-Type': 'application/json'},
      (window.location.hostname === '' || window.location.hostname.includes('claude.ai') || window.location.hostname.includes('anthropic.com')) ? {
        'x-api-key': (sessionStorage.getItem('cgt_key') || ''),
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      } : {}
    ),
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: maxTokens,
      system: systemPrompt,
      messages: messages
    })
  });
  const data = await resp.json();
  if (data.error) throw new Error(data.error.message || 'API error');
  return (data.content || []).filter(b => b.type === 'text').map(b => b.text).join('');
}

// ─── BREAK-EVEN ANALYSIS: Old vs New CGT Regime ──────────────────────────────
function calcBreakEven(price, mtr, yrs, inflation) {
  // Find growth rate where old regime (50% disc) = new regime (inflation indexed)
  // old CGT = nomGain * 0.5 * mtr
  // new CGT = realGain * max(mtr, 0.30)  ← 30% floor when MTR < 30%
  // Break-even is typically around inflation + 1-3%, so search 0 to 15%
  const effectiveNewRate = Math.max(mtr, 0.30);
  const inflAdj = price * (Math.pow(1 + inflation/100, yrs) - 1);
  let lo = 0, hi = 15, breakEvenGrowth = inflation;
  for (let i = 0; i < 200; i++) {
    const mid = (lo + hi) / 2;
    const nomGain = price * (Math.pow(1 + mid/100, yrs) - 1);
    const realGain = Math.max(0, nomGain - inflAdj);
    const newCGT = realGain * effectiveNewRate;
    const oldCGT = nomGain * 0.5 * mtr;
    if (Math.abs(newCGT - oldCGT) < 0.01) { breakEvenGrowth = mid; break; }
    if (newCGT < oldCGT) lo = mid; else hi = mid;
    breakEvenGrowth = mid;
  }
  return Math.round(breakEvenGrowth * 10) / 10;
}

function buildRegimeComparison(price, mtr, yrs, inflation, growth) {
  const sc = 0.025;
  const beGrowth = calcBreakEven(price, mtr, yrs, inflation);
  const futVal = price * Math.pow(1 + growth/100, yrs);
  const netProc = futVal * (1 - sc);
  const nomGain = Math.max(0, netProc - price);
  const inflAdj = price * Math.pow(1 + inflation/100, yrs);
  const realGain = Math.max(0, netProc - inflAdj);
  const effectiveNewRate = Math.max(mtr, 0.30);
  const floorApplies = mtr < 0.30;
  const oldCGT = nomGain * 0.5 * mtr;
  const newCGT = realGain * effectiveNewRate;
  const newBetter = newCGT <= oldCGT;
  const diff = Math.abs(oldCGT - newCGT);
  const diffPct = nomGain > 0 ? Math.round(diff / nomGain * 100 * 10) / 10 : 0;
  const greenBg = 'background:var(--greenl);border:1px solid var(--green);border-radius:var(--r);padding:.75rem';
  const neutralBg = 'background:var(--bg2);border:1px solid var(--bdr);border-radius:var(--r);padding:.75rem';
  const verdictStyle = newBetter
    ? 'background:var(--greenl);border-radius:var(--r);padding:10px 14px;font-size:13px;color:var(--green);line-height:1.6;margin-bottom:.75rem'
    : 'background:var(--warn-bg);border-radius:var(--r);padding:10px 14px;font-size:13px;color:var(--warn-txt);line-height:1.6;margin-bottom:.75rem';
  const verdictText = newBetter
    ? '<strong>New regime is better for you</strong> — inflation has eroded enough real gain that the new rules produce less CGT than the old 50% discount. You save ' + fmt(diff) + ' (' + diffPct + '% of your gain).'
    : '<strong>Old regime was better</strong> — at ' + growth + '% growth and ' + inflation + '% inflation, the 50% discount would have saved you ' + fmt(diff) + ' (' + diffPct + '% of your gain).';
  const ruleText = growth < beGrowth
    ? ' Your assumption of ' + growth + '% is below this — new regime wins.'
    : ' Your assumption of ' + growth + '% is above this — old regime would have been better.';
  const floorNote = floorApplies
    ? ' <strong>Note:</strong> The 30% minimum tax floor applies to your situation (MTR ' + Math.round(mtr*100) + '% < 30%). This makes the new regime comparatively less attractive for lower-income investors — the floor effectively raises your new CGT rate above your marginal rate.'
    : '';

function esec(id, title, sub, rows, iid, defQ) {
  return `<div class="es" id="es-${id}">
    <div class="eh" onclick="tog('${id}')">
      <div><div class="et">${title}</div><div class="es2">${sub}</div></div>
      <i class="ti ti-chevron-down" id="eti-${id}" style="color:var(--txt2);font-size:16px;flex-shrink:0"></i>
    </div>
    <div class="eb" id="ebb-${id}">
      <div class="eb-rows">${rows.map((r,i) => r[0]==='---'
        ? `<div class="eb-div"></div>`
        : `<div class="eb-row${i===rows.length-1?' eb-total':''}">
            <div class="eb-label">${r[0]}</div>
            <div class="eb-val">${r[1]}${r[1]?`<button class="sr-ask" onclick="askMetric('${r[0].replace(/'/g, "\\'")}','${r[1].replace(/'/g, "\\'")}')">?</button>`:''}</div>
          </div>`
      ).join('')}</div>
      <div class="iaw">

      </div>
      <div class="ia-ans" id="ians-${iid}"></div>

}

function tog(id) {
  const b = $('ebb-'+id), ic = $('eti-'+id), o = b.classList.contains('open');
  b.classList.toggle('open', !o);
  if (ic) ic.style.transform = o ? '' : 'rotate(180deg)';
}

async function askS(id, title) {
  const inp = $('ia-'+id), q = inp.value.trim();
  if (!q) return;
  inp.value = '';
  const ans = $('ians-'+id);
  ans.style.display = 'block';
  ans.textContent = 'Thinking…';
  const df = Object.entries(D).filter(([,v]) => v !== null).map(([k,v]) => `${k}:${v}`).join(', ');
  const sys = `You are an expert Australian property tax adviser. Answer the user's question about the "${title}" section of the analysis. 2-3 paragraphs max, plain English, Australian English. Always note this is general information only. Data: ${df}`;
  try {
    const text = await callAPI(sys, [{ role: 'user', content: q }], 500);
    ans.textContent = text;
  } catch(e) {
    ans.textContent = 'Error: ' + e.message;
  }
}

function ns(steps) {

function disc() {

function buildSellBefore() {

  const gr=n(D.expectedGrowth)||4.5,yrTo=n(D.yearsToReform)||1,yrAft=n(D.yearsAfterReform)||3,sc=0.025;
  const exp=n(D.annualExpenses)||(inc>0?inc*0.10:8000);
  const netNow=cur*(1-sc),gainNow=Math.max(0,netNow-cost),cgtNow=gainNow*0.5*mtr;
  const futLater=fv(cur,gr,yrTo+yrAft),netLater=futLater*(1-sc);
  const preGain=Math.max(0,fv(cur,gr,yrTo)-cost),preCGT=preGain*0.5*mtr;

    <div class="mc"><div class="ml">CGT if sold later</div><div class="mv neg">${fmt(cgtLater)}</div><button class="mc-ask" onclick="askMetric('CGT if sold later','${fmt(cgtLater)}')" title="Ask about this number">?</button></div>
    <div class="mc"><div class="ml">Net proceeds later</div><div class="mv neu">${fmt(netLater-cgtLater+totalCF)}</div><button class="mc-ask" onclick="askMetric('Net proceeds later','${fmt(netLater-cgtLater+totalCF)}')" title="Ask about this number">?</button></div>
    <div class="mc"><div class="ml">Advantage of ${sellBetter?'selling now':'waiting'}</div><div class="mv ${sellBetter?'pos':'neg'}">${fmt(Math.abs(netWait))}</div><button class="mc-ask" onclick="askMetric('Advantage of ${sellBetter?"selling now":"waiting"}','${fmt(Math.abs(netWait))}')" title="Ask about this number">?</button></div>
    <div class="mc"><div class="ml">Annual cash flow</div><div class="mv ${annCF>=0?'pos':'neg'}">${fmt(annCF)}</div><button class="mc-ask" onclick="askMetric('Annual cash flow','${fmt(annCF)}')" title="Ask about this number">?</button></div>
    <div class="mc"><div class="ml">Net cash after loan repayment</div><div class="mv ${(netNow-cgtNow-loan)>=0?'pos':'neg'}">${fmt(netNow-cgtNow-loan)}</div><button class="mc-ask" onclick="askMetric('Net cash after loan repayment','${fmt(netNow-cgtNow-loan)}')" title="Ask about this number">?</button></div>

  </div>

  ${esec('cf-hold','Cash flow during holding period','Net return after interest, expenses and tax benefit',
    [['Annual rent / income',fmt(inc)],['Less annual expenses',fmt(exp)],['Less annual interest',fmt(loan*rate/100)],['Net pre-tax cash flow',fmt(annCF)],['Negative gearing benefit (if applicable)',annCF<0?fmt(Math.abs(annCF)*mtr):'N/A — positively geared'],['Total net cash flow over hold period',fmt(totalCF)]],'cf-q','Is negative gearing still worth it post-Budget?')}

function buildHoldOrSell() {

    <div class="mc"><div class="ml">Annual cash flow</div><div class="mv ${annCF>=0?'pos':'neg'}">${fmt(annCF)}</div><button class="mc-ask" onclick="askMetric('Annual cash flow','${fmt(annCF)}')" title="Ask about this number">?</button></div>

function buildPPORConvert() {

  const pRent=n(D.pporConvertRent)||curVal*0.035;
  const pExp=n(D.pporConvertExp)||(pRent*0.10);

  const A_CF=nRent-nExp-(newLoan*rate/100),A_netCF=A_CF+(A_CF<0?Math.abs(A_CF)*mtr:0);
  const A_future=futNew*(1-sc),A_inflAdj=fv(newPrice,2.5,yrs),A_postGain=Math.max(0,A_future-A_inflAdj);
  const A_cgt=Math.max(A_postGain*mtr,A_postGain*0.3);

function buildBuyEstablished() {

function buildBuyOrWait() {

      const netNow=cur*(1-sc2),gainNow=Math.max(0,netNow-cost),cgtNow=gainNow*0.5*mtr;
      const futVal=fv(cur,gr,yrTo+yrAft),netLater=futVal*(1-sc2);
      const val27=fv(cur,gr,yrTo),preGain=Math.max(0,val27-cost),preCGT=preGain*0.5*mtr;
      const inflAdj=fv(val27,2.5,yrAft),postGain=Math.max(0,netLater-inflAdj),postCGT=Math.max(postGain*mtr,postGain*0.3);
      const cgtLater=preCGT+postCGT,annCF=inc-exp-(loan*rate/100),totalCF=annCF*(yrTo+yrAft);
      const netWait=(netLater-cgtLater+totalCF)-(netNow-cgtNow);
      calcStr = `
CALCULATED FIGURES:
- Net sale proceeds if sold now: ${fmt(netNow)}
- Total capital gain if sold now: ${fmt(gainNow)}
- CGT if sold now (50% discount, ${Math.round(mtr*100)}% MTR): ${fmt(cgtNow)}
- After-tax net if sold now: ${fmt(netNow-cgtNow)}
- Estimated value at 1 July 2027: ${fmt(val27)}
- Pre-reform gain (cost to 1 Jul 2027 value): ${fmt(preGain)}
- Pre-reform CGT (50% discount): ${fmt(preCGT)}
- Inflation-adjusted base at future sale: ${fmt(inflAdj)}
- Post-reform real gain (above inflation): ${fmt(postGain)}
- Post-reform CGT (higher of MTR or 30%): ${fmt(postCGT)}
- Total CGT if sold later: ${fmt(cgtLater)}
- Annual net cash flow: ${fmt(annCF)}
- Total net cash flow over hold period: ${fmt(totalCF)}
- Net benefit of waiting vs selling now: ${fmt(netWait)}`;
    }

    if(newPrice > 0) {
      const newCF=newRent-newExp-(newLoan*rate/100),newNetCF=newCF+(newCF<0?Math.abs(newCF)*mtr:0);
      const newFut=fv(newPrice,gr,yrs),newInflAdj=fv(newPrice,2.5,yrs);
      const newPostGain=Math.max(0,newFut*(1-sc2)-newInflAdj),newCGT=Math.max(newPostGain*mtr,newPostGain*0.3);
      calcStr += `
NEW PROPERTY FIGURES:
- New property purchase price: ${fmt(newPrice)}
- New property annual net cash flow: ${fmt(newNetCF)}
- New property future value (${yrs} years): ${fmt(newFut)}
- New property estimated CGT on sale: ${fmt(newCGT)}`;
    }

    if(cur > 0 && newPrice > 0 && (sc === 'ppor_convert')) {
      const pRent=n(D.pporConvertRent)||cur*0.035,pExp=n(D.pporConvertExp)||10000;
      const futCur=fv(cur,gr,yrs),futNew=fv(newPrice,gr,yrs);
      const A_CF=newRent-newExp-(newLoan*rate/100),A_netCF=A_CF+(A_CF<0?Math.abs(A_CF)*mtr:0);
      const A_future=futNew*(1-sc2),A_inflAdj=fv(newPrice,2.5,yrs),A_postGain=Math.max(0,A_future-A_inflAdj);
      const A_cgt=Math.max(A_postGain*mtr,A_postGain*0.3),A_wealth=futCur+(A_future-A_cgt)+(A_netCF*yrs)-loan;
      const B_CF=pRent-pExp-(loan*rate/100),B_netCF=B_CF+(B_CF<0?Math.abs(B_CF)*mtr:0);
      const B_prop=yrs/(yrs+heldYrs),B_gain=Math.max(0,futCur*(1-sc2)-cost);
      const B_tax=B_gain*B_prop,B_cgt=B_tax*0.5*mtr;
      const B_pporNet=futCur*(1-sc2)-B_cgt,B_wealth=B_pporNet+futNew-newLoan+(B_netCF*yrs);
      calcStr += `
PPOR COMPARISON:
- Option A (keep PPOR + buy investment) estimated total wealth: ${fmt(A_wealth)}
- Option A: CGT on current home: $0 (PPOR fully exempt)
- Option A: Annual investment cash flow: ${fmt(A_netCF)}
- Option B (convert PPOR + buy new) estimated total wealth: ${fmt(B_wealth)}
- Option B: CGT on converted home (${Math.round(B_prop*100)}% investment period): ${fmt(B_cgt)}
- Option B: Annual converted-home cash flow: ${fmt(B_netCF)}
- Option B: Investment period proportion: ${Math.round(B_prop*100)}% of total ownership
- Preferred option: ${A_wealth >= B_wealth ? 'Option A' : 'Option B'} by ${fmt(Math.abs(A_wealth-B_wealth))}`;
    }
  } catch(e) {
    calcStr = '(Calculation context unavailable: ' + e.message + ')';
  }

  return `You are an expert Australian property tax, CGT and financial planning AI adviser. 
You have just produced a complete analysis for a client. Answer their questions about ANY aspect of the results, calculations, assumptions, tax law basis, or strategy.

SCENARIO DETECTED: ${sc}

CLIENT DATA COLLECTED:
${dataStr}
${calcStr}

TAX LAW BASIS YOU CAN EXPLAIN:
- CGT discount: s115-100 ITAA 1997 — 50% discount for individuals/trusts on assets held >12 months
- Main residence exemption: Subdivision 118-B ITAA 1997 — full exemption if PPOR throughout
- Partial main residence: s118-185 — time-apportionment based on periods of use
- 6-year absence rule: s118-145 — treat absent dwelling as main residence for up to 6 years
- Post-reform CGT (1 Jul 2027): inflation-indexed real gain replaces 50% discount for established property (new purchases after 12 May 2026)
- Negative gearing abolished for established residential property (new purchases after 12 May 2026) — losses quarantined, can only offset residential rental income or capital gains, NOT salary
- New builds: retain BOTH negative gearing AND 50% CGT discount post-reform
- Grandfathered properties (held before 7:30pm 12 May 2026): keep existing negative gearing AND 50% CGT discount
- New build treatment: may retain 50% discount under post-reform rules
- Negative gearing: s8-1 ITAA 1997 — deductible if genuinely incurred in producing assessable income
- Small business CGT concessions: Div 152 ITAA 1997 — 15-year exemption, retirement exemption, 50% active asset reduction, rollover
- Grandfathering: assets held before Budget night retain pre-reform treatment
- Cost base: s110-25 ITAA 1997 — purchase price + incidental costs + ownership costs + capital improvements
- Selling costs: reduce capital proceeds (s116-20), typically 2-3% of sale price

ASSUMPTIONS USED IN THIS MODEL:
- Selling costs: 2.5% of sale price
- Stamp duty on purchase: 4% of purchase price
- Inflation rate: ${D.inflationRate || 2.5}%
- Expected annual growth: ${D.expectedGrowth || 4.5}%
- Years to 1 July 2027 reform: ${D.yearsToReform || 1}
- Years held after reform before sale: ${D.yearsAfterReform || 3}
- Post-reform CGT: higher of (real gain × marginal rate) or (real gain × 30%)
- Negative gearing: ABOLISHED for new established purchases after 12 May 2026 — losses quarantined
- New builds: retain negative gearing AND 50% CGT discount
- Grandfathered (pre-Budget holdings): keep all existing tax treatment
- Negative gearing benefit: loss × marginal tax rate, applied annually
- PPOR partial exemption: investment years ÷ total years × full gain
- Annual expenses default: 10% of annual rental income (property management, maintenance, rates, insurance)
- DO NOT quote any expense figure other than what is in the client data or this assumption

ANSWER STYLE:
- ONLY use the exact numbers provided in CLIENT DATA and CALCULATED FIGURES above. NEVER invent figures, percentages, or dollar amounts not explicitly listed.
- If asked about expenses: the model uses expenses = 10% of annual rent income. State this explicitly.
- If asked about a figure not in your data: say "That figure wasn't part of this analysis — here's what was calculated: [relevant figure]"
- Be specific and quantitative — reference ONLY the actual numbers from this client's analysis
- Explain tax law in plain English, cite the section reference briefly
- For calculation questions, walk through each step using ONLY the numbers from CALCULATED FIGURES
- 3-4 paragraphs max unless a detailed breakdown is specifically requested
- Australian English
- Never invent example calculations with made-up numbers when real numbers are available
- Always end with: "This is general information only — not tax or financial advice. Please confirm with your accountant."`;
}

function advAddMsg(html, role) {
  const area = document.getElementById('advHist');
  const w = document.createElement('div');
  w.className = 'adv-msg';
  if (role === 'user') {
    w.innerHTML = `<div class="adv-bub adv-bub-u" style="margin-left:auto">${html}</div><div class="av av-u" style="flex-shrink:0">You</div>`;
  } else {
    const cls = role === 't' ? 'adv-bub-t' : 'adv-bub-ai';
    w.innerHTML = `<div class="av av-ai" style="flex-shrink:0">AI</div><div class="adv-bub ${cls}">${html}</div>`;
  }
  area.appendChild(w);
  area.scrollTop = area.scrollHeight;
  return w.querySelector('.adv-bub');
}

function advShowT() {
  const el = advAddMsg('Thinking…', 't');
  let i = 0;
  el._t = setInterval(() => { el.textContent = 'Thinking' + ['…','.. ','.  '][i++%3]; }, 400);
  advTel = el;
}
function advHideT() {
  if (advTel) { clearInterval(advTel._t); advTel.closest('.adv-msg').remove(); advTel = null; }
}

async function advSend() {
  const inp = document.getElementById('advIn');
  const msg = inp.value.trim();
  if (!msg) return;
  inp.value = '';
  document.getElementById('advBtn').disabled = true;
  document.getElementById('advChips').innerHTML = '';
  advAddMsg(msg, 'user');
  advShowT();

  advHist.push({ role: 'user', content: msg });

  try {
    const raw = await callAPI(calcContext, advHist.slice(-20), 800);
    // Strip markdown formatting from adviser responses
    var text = raw;
    text = text.replace(/^#{1,3} /gm, '');
    text = text.replace(/\/\*\*/g, '').replace(/\*\*\//g, '');
    text = text.split('**').join('');
    text = text.split('*').join('');
    text = text.split('`').join('');
    text = text.replace(/^---$/gm, '—').trim();
    advHideT();
    advAddMsg(text, 'ai');
    advHist.push({ role: 'assistant', content: text });
  } catch(e) {
    advHideT();
    advAddMsg('Error: ' + e.message, 'ai');
  }
  document.getElementById('advBtn').disabled = false;
  inp.focus();
}

function advChip(q) {
  document.getElementById('advIn').value = q;
  advSend();
}

function showAdviser() {
  calcContext = buildAdviserContext();
  const panel = document.getElementById('advPanel');
  panel.classList.add('visible');
  // Only scroll if panel is not already visible in viewport
  const rect = panel.getBoundingClientRect();
  if (rect.top > window.innerHeight || rect.bottom < 0) {
    panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  // Opening message from the adviser
  const area = document.getElementById('advHist');
  if (area.children.length === 0) {
    advAddMsg("I've reviewed the full analysis. Ask me about any number, calculation, tax law, or what would change if your assumptions were different.", 'ai');
  }

  // Scenario-specific suggested questions
  const sc = D.scenarioType || '';
  const chips = {
    sell_before_reform: ['How was my CGT calculated?','What is the 50% CGT discount and how does it work?','What tax law applies to my situation?','Why might the post-reform CGT be higher?','What assumptions did you use?','How does grandfathering affect me?'],
    sell_after_reform: ['Walk me through the gain split at 1 July 2027','How is the inflation adjustment calculated?','What is the legal basis for the post-reform rules?','Why is my post-reform CGT calculated at the higher of marginal rate or 30%?','What if my growth assumption is wrong?','Do I definitely need a formal valuation?'],
    hold_or_sell: ['Why does holding come out ahead in my case?','How did you calculate the net benefit of waiting?','What assumptions drive this result the most?','What would change if interest rates rise?','Explain negative gearing for my situation','What is the tax law basis for the CGT calculation?'],
    ppor_convert: ['How is the partial PPOR exemption calculated?','Walk me through the Option A vs B comparison','What is the legal basis for the 6-year rule?','Why is Option A better/worse in my case?','How would the result change if I rented my current home for more?','What are the stamp duty implications?'],
    buy_established: ['How does post-reform CGT affect my purchase compared to before?','Is the yield on this property sufficient?','How was the total estimated return calculated?','What would the CGT be if I sold after 5 years instead of 7?','Explain negative gearing for this property','What assumptions are most uncertain?'],
    buy_new_build: ['Why exactly do new builds get better CGT treatment?','How does the CGT comparison between new and established work?','What is the depreciation benefit on a new build?','What are the risks of buying a new build vs established?','How was the yield calculated?'],
    valuation: ['How exactly does a valuation protect my CGT position?','What is the legal basis for the 1 July 2027 valuation?','What happens if I do not get a valuation?','Is CoreLogic legally sufficient?','Walk me through how the pre-reform gain was calculated','What records do I need to keep?'],
  };
  const defaultChips = ['How was this calculated?','What tax law applies?','What are the key assumptions?','What would change my result most?','Explain the CGT rules in plain English','What should I do next?'];
  const q = chips[sc] || defaultChips;
  document.getElementById('advChips').innerHTML = q.map(c =>
    `<button class="adv-chip" onclick="advChip('${c.replace(/'/g,"\'")}') ">${c}</button>`
  ).join('');
}

// Inject the adviser panel HTML into the page (called once after DOM ready)
function injectAdviserPanel() {
  const existing = document.getElementById('advPanel');
  if (existing) return;
  // Add subtle prompt button
  const prompt = document.createElement('div');
  prompt.id = 'advPrompt';
  prompt.style.cssText = 'display:none;margin-top:.75rem;text-align:center';
  prompt.innerHTML = '<button id="advPromptBtn" style="background:var(--bg);border:1px solid var(--red);color:var(--red);border-radius:999px;padding:8px 20px;font-size:13px;font-weight:500;cursor:pointer"><i class=\"ti ti-message-circle\" style=\"font-size:14px;margin-right:6px\"></i>Ask the adviser a question ↓</button>';
  document.getElementById('advPromptBtn').onclick = function() { showAdviser(); prompt.style.display='none'; };
  document.getElementById('rw').after(prompt);
  const panel = document.createElement('div');
  panel.id = 'advPanel';
  panel.innerHTML = `
    <div class="adv-header">
      <div class="av av-ai" style="flex-shrink:0;width:34px;height:34px;font-size:13px">AI</div>
      <div>
        <h3>Ask the adviser — question anything</h3>
        <p>Full access to all calculations, assumptions, tax law basis and strategy</p>
      </div>
    </div>
    <div class="adv-history" id="advHist"></div>
    <div class="adv-chips" id="advChips"></div>
    <div class="adv-input-row">
      <input type="text" id="advIn" placeholder="Ask about any number, calculation, assumption or tax rule..." onkeydown="if(event.key==='Enter'&&!event.shiftKey)advSend()">
      <button id="advBtn" onclick="advSend()">Ask ↗</button>
    </div>`;
  document.getElementById('rw').after(panel);
}

domReady(injectAdviserPanel);
</script>

</html>
